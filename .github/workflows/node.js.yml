name: Node.js

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v3  
      - name: Use Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '18.20.2'
      
      # Install dependencies and restart services
      - name: Install dependencies and restart services
        run: |
          cd backend
          npm i
          pm2 restart 0
          pm2 save
      #   sudo service nginx restart