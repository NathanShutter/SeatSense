name: Node.js

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v3  
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v2
        with:
          node-version: ${{ matrix.node-version }}
      
      # Build the backend
      - name: Build Backend
        run: |
          cd backend
          npm i

      # Build the frontend
      - name: Build Frontend
        run: |
          cd frontend
          npm i
          npm run build