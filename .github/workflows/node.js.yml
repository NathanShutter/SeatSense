name: Node.js

on: 
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
   runs-on: self-hosted

   steps:
   - uses: actions/checkout@v2
   - name: Use Nodes.js ${{ matrix.node-version}}
     uses: action/setup-node@v1
     with:
       node-version: ${{ matrix.node-version }}
   - run: |
        npm i
        cd frontend
        npm i
        npm run build
   
       